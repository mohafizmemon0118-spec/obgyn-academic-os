<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBGYN Academic OS</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
  --accent:#14b8a6;
  --bg-dark:#0b1220;
  --card-dark:rgba(255,255,255,0.05);
  --text-dark:#e6edf3;

  --bg-light:#f6f4ef;
  --card-light:#ffffff;
  --text-light:#1e293b;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  transition:0.4s ease;
  overflow-x:hidden;
}

body.dark{
  background:linear-gradient(135deg,#0b1220,#111827,#0b1220);
  color:var(--text-dark);
}

body.light{
  background:linear-gradient(135deg,#f6f4ef,#ffffff,#f6f4ef);
  color:var(--text-light);
}

header{
  padding:40px 20px;
  text-align:center;
  animation:fadeIn 1s ease;
}

header h1{
  font-family:'Caveat',cursive;
  font-size:48px;
  margin:0;
  color:var(--accent);
  letter-spacing:1px;
}

header p{
  opacity:0.7;
  margin-top:8px;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:20px;
}

.card{
  padding:25px;
  border-radius:18px;
  cursor:pointer;
  backdrop-filter:blur(12px);
  transition:0.3s ease;
  border:1px solid rgba(255,255,255,0.08);
  animation:fadeUp 0.8s ease;
}

body.dark .card{
  background:var(--card-dark);
}

body.light .card{
  background:var(--card-light);
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
  box-shadow:0 10px 30px rgba(20,184,166,0.3);
}

.card h3{
  margin:0;
  font-size:17px;
}

.toggle{
  position:fixed;
  top:20px;
  right:20px;
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:30px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

footer{
  text-align:center;
  padding:30px;
  font-size:12px;
  opacity:0.4;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-20px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<button class="toggle" onclick="toggleMode()">Toggle Mode</button>

<header>
  <h1>🩺 OBGYN Academic OS</h1>
  <p>Hybrid Cognitive Command Center</p>
</header>

<div class="container" id="mainMenu">

  <div class="card" onclick="loadTopics()">
    <h3>📚 Topics</h3>
  </div>

  <div class="card"><h3>🎯 Viva Mode</h3></div>
  <div class="card"><h3>🧠 Flashcards</h3></div>
  <div class="card"><h3>🔀 Algorithm</h3></div>
  <div class="card"><h3>🩺 Case Simulation</h3></div>
  <div class="card"><h3>⚡ Rapid Revision</h3></div>

</div>

<div id="contentArea" style="padding:20px;"></div>

<footer>
  OBGYN Academic OS v2 — Elite Cognitive Training Platform
</footer>

<script>
async function loadTopics() {

  const mainMenu = document.getElementById("mainMenu");
  const content = document.getElementById("contentArea");

  mainMenu.style.display = "none";

  const response = await fetch("topics.json");
  const topics = await response.json();

  content.innerHTML = "<h2>Available Topics</h2>";

  topics.forEach(topic => {
    content.innerHTML += `
      <div class="card" style="margin-top:15px; cursor:pointer;" 
           onclick="openTopic('${topic.id}')">
        <h3>${topic.title}</h3>
        <p style="opacity:0.6;">
          ${topic.category} • ${topic.examWeight}
        </p>
      </div>
    `;
  });

  content.innerHTML += `
    <div style="margin-top:30px;">
      <button onclick="goHome()" class="toggle">Back</button>
    </div>
  `;
}

function goHome(){
  document.getElementById("mainMenu").style.display = "grid";
  document.getElementById("contentArea").innerHTML = "";
}
function toggleMode(){
  const body=document.body;
  if(body.classList.contains("dark")){
    body.classList.remove("dark");
    body.classList.add("light");
    localStorage.setItem("theme","light");
  }else{
    body.classList.remove("light");
    body.classList.add("dark");
    localStorage.setItem("theme","dark");
  }
}
async function openTopic(topicId){

  const content = document.getElementById("contentArea");

  const response = await fetch(`topics/${topicId}.md`);
  const markdown = await response.text();

  const sections = parseSections(markdown);

  content.innerHTML = `
    <div>
      <button onclick="loadTopics()" class="toggle">Back</button>

      <div style="margin-top:40px; display:flex; gap:10px; flex-wrap:wrap;">
        <button onclick="showSection('notes')" class="toggle">Notes</button>
        <button onclick="showSection('viva')" class="toggle">Viva</button>
        <button onclick="showSection('flashcards')" class="toggle">Flashcards</button>
        <button onclick="showSection('algorithm')" class="toggle">Algorithm</button>
      </div>

      <div id="topicContent" style="margin-top:30px;"></div>
    </div>
  `;

  window.currentSections = sections;
  showSection("notes");
}
function parseSections(markdown){

  return {
    notes: extract(markdown, "## NOTES"),
    viva: extract(markdown, "## VIVA"),
    flashcards: extract(markdown, "## FLASHCARDS"),
    algorithm: extract(markdown, "## ALGORITHM")
  };
}

function extract(text, marker){

  const parts = text.split(marker);
  if(parts.length < 2) return "Not available.";

  const after = parts[1];
  const nextSection = after.split("## ")[0];

  return nextSection.trim();
}

function showSection(type){

  const contentDiv = document.getElementById("topicContent");

  const sectionMarkdown = window.currentSections[type];

  contentDiv.innerHTML = marked.parse(sectionMarkdown || "Not available.");
}
const savedTheme = localStorage.getItem("theme");
if(savedTheme){
  document.body.classList.add(savedTheme);
}else{
  document.body.classList.add("dark");
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
