<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBGYN Academic OS</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<button class="toggle theme-toggle" onclick="toggleMode()">Toggle Mode</button>

<header>
  <h1>🩺 OBGYN Academic OS</h1>
  <p>Hybrid Cognitive Command Center</p>
</header>

<div class="container" id="mainMenu">

  <div class="card" onclick="loadTopics()">
    <h3>📚 Topics</h3>
  </div>

  <div class="card"><h3>🎯 Viva Mode</h3></div>
  <div class="card"><h3>🧠 Flashcards</h3></div>
  <div class="card"><h3>🔀 Algorithm</h3></div>
  <div class="card"><h3>🩺 Case Simulation</h3></div>
  <div class="card"><h3>⚡ Rapid Revision</h3></div>

</div>

<div id="contentArea" style="padding:20px;"></div>

<footer>
  OBGYN Academic OS v2 — Elite Cognitive Training Platform
</footer>

<script>
async function loadTopics() {

  const mainMenu = document.getElementById("mainMenu");
  const content = document.getElementById("contentArea");

  mainMenu.style.display = "none";

  const response = await fetch("topics.json");
  const topics = await response.json();

  content.innerHTML = "<h2>Available Topics</h2>";

  topics.forEach(topic => {
    content.innerHTML += `
      <div class="card"
           onclick="openTopic('${topic.id}')">
        <h3>${topic.title}</h3>
        <p style="opacity:0.6;">
          ${topic.category} • ${topic.examWeight}
        </p>
      </div>
    `;
  });

  content.innerHTML += `
      <button onclick="goHome()" class="toggle">Back</button>
    </div>
  `;
}

function goHome(){
  document.getElementById("mainMenu").style.display = "grid";
  document.getElementById("contentArea").innerHTML = "";
}
function toggleMode(){
  const body=document.body;
  if(body.classList.contains("dark")){
    body.classList.remove("dark");
    body.classList.add("light");
    localStorage.setItem("theme","light");
  }else{
    body.classList.remove("light");
    body.classList.add("dark");
    localStorage.setItem("theme","dark");
  }
}
async function openTopic(topicId){

  const content = document.getElementById("contentArea");

  const response = await fetch(`./topics/${topicId}.md`);
  const markdown = await response.text();

  const sections = parseSections(markdown);

  content.innerHTML = `
    <div>
      <button onclick="loadTopics()" class="toggle">Back</button>

      <div class="mode-buttons">
        <button onclick="showSection('notes')" class="toggle">Notes</button>
        <button onclick="showSection('viva')" class="toggle">Viva</button>
        <button onclick="showSection('flashcards')" class="toggle">Flashcards</button>
        <button onclick="showSection('algorithm')" class="toggle">Algorithm</button>
      </div>

      <div id="topicContent" style="margin-top:30px;"></div>
    </div>
  `;

  window.currentSections = sections;
  showSection("notes");
}
function parseSections(markdown) {

  const sections = {
    notes: "",
    viva: "",
    flashcards: "",
    algorithm: ""
  };

  const lines = markdown.split("\n");
  let current = null;

  lines.forEach(line => {

    const trimmed = line.trim().toUpperCase();

    if (trimmed === "## NOTES") {
      current = "notes";
      return;
    }

    if (trimmed === "## VIVA") {
      current = "viva";
      return;
    }

    if (trimmed === "## FLASHCARDS") {
      current = "flashcards";
      return;
    }

    if (trimmed === "## ALGORITHM") {
      current = "algorithm";
      return;
    }

    if (current) {
      sections[current] += line + "\n";
    }

  });

  return sections;
}

function showSection(type){

  const contentDiv = document.getElementById("topicContent");
  const buttons = document.querySelectorAll(".mode-buttons button");

  buttons.forEach(btn => btn.classList.remove("active"));

  const activeBtn = [...buttons].find(btn =>
    btn.getAttribute("onclick").includes(type)
  );

  if (activeBtn) activeBtn.classList.add("active");

  const sectionMarkdown = window.currentSections[type];

  if (!sectionMarkdown || sectionMarkdown.trim() === "") {
    contentDiv.innerHTML = "<p>Not available.</p>";
  } else {
    contentDiv.innerHTML = marked.parse(sectionMarkdown);
  }
}

</script>

</body>
</html>
