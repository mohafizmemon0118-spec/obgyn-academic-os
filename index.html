<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBGYN Academic OS</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg-dark:#0f172a;
  --card-dark:#1e293b;
  --text-dark:#e2e8f0;
  --accent:#14b8a6;

  --bg-light:#f8f6f2;
  --card-light:#ffffff;
  --text-light:#1e293b;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  transition:0.4s ease;
}

body.dark{
  background:var(--bg-dark);
  color:var(--text-dark);
}

body.light{
  background:var(--bg-light);
  color:var(--text-light);
}

header{
  padding:30px 20px;
  text-align:center;
}

header h1{
  font-family:'Caveat',cursive;
  font-size:42px;
  margin:0;
  color:var(--accent);
}

header p{
  opacity:0.7;
  margin-top:5px;
}

.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:15px;
}

.card{
  padding:20px;
  border-radius:16px;
  cursor:pointer;
  transition:0.3s ease;
}

body.dark .card{
  background:var(--card-dark);
}

body.light .card{
  background:var(--card-light);
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  margin:0;
  font-size:16px;
}

.toggle{
  position:fixed;
  top:15px;
  right:15px;
  background:var(--accent);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  opacity:0.5;
}

</style>
</head>

<body class="dark">

<button class="toggle" onclick="toggleMode()">Light Mode</button>

<header>
  <h1>🩺 OBGYN Academic OS</h1>
  <p>Hybrid Cognitive Command Center</p>
</header>

<div class="container">

  <div class="card"><h3>📚 Topics</h3></div>
  <div class="card"><h3>🎯 Viva Mode</h3></div>
  <div class="card"><h3>🧠 Flashcards</h3></div>
  <div class="card"><h3>🔀 Algorithm</h3></div>
  <div class="card"><h3>🩺 Case Simulation</h3></div>
  <div class="card"><h3>⚡ Rapid Revision</h3></div>

</div>

<footer>
  OBGYN Academic OS v1 — Cognitive Training Platform
</footer>

<script>

function toggleMode(){
  const body=document.body;
  const btn=document.querySelector(".toggle");

  if(body.classList.contains("dark")){
    body.classList.remove("dark");
    body.classList.add("light");
    btn.innerText="Dark Mode";
  }else{
    body.classList.remove("light");
    body.classList.add("dark");
    btn.innerText="Light Mode";
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
